# CI: verificações leves em push e pull request (sem npm install pesado).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Ficheiros essenciais do site
        run: |
          set -e
          test -f index.html
          test -f propers.html
          test -f propers.js
          test -f miscChants.js
          test -d Prophetiarium-Xicatunense/transcriptions

      - name: Sintaxe Node (scripts .mjs do Prophetiarium)
        run: |
          set -e
          shopt -s nullglob
          for f in Prophetiarium-Xicatunense/transcriptions/*.mjs; do
            node --check "$f"
          done
